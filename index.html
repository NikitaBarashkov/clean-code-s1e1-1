<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="./style/style.css" media="screen">
</head>
<body>
    <header class="head">
        <img src="./assets/eisenhower-matrix.jpg" alt="table with tasks">
        <a class="more-inf" href="https://goal-life.com/page/method/matrix-eisenhower">
            Want more details&quest</a>
    </header>
    <main class="container">
        <div class="container__add-item">
            <label class="add-task-label" for="new-task">Add Item</label>
            <div class="task-row-wrapper">
                <input id="new-task" class="task for-input" type="text"><button class="edit">Add</button>
            </div>
        </div>
        <h3 class="name-stage-task">Todo</h3>
        <ul id="incomplete-tasks">
            <li class="line-with-task">
                <input class="check" type="checkbox">
                <label class="task _label">Pay Bills</label>
                <input type="text" class="task for-input edit-no-display">
                <button class="edit">Edit</button>
                <button class="delete"><img class="img-delete" src="./assets/remove.svg" alt="delete"></button>
            </li>
            <li class="line-with-task editMode">
                <input class="check" type="checkbox">
                <label class="task _label edit-no-display">Go Shopping</label>
                <input type="text" value="Go Shopping" class="task for-input">
                <button class="edit">Save</button>
                <button class="delete"><img class="img-delete" src="./assets/remove.svg" alt="delete"></button>
            </li>
        </ul>
        <h3 class="name-stage-task">Completed</h3>
        <ul id="completed-tasks">
            <li class="line-with-task">
                <input class="check" type="checkbox" checked>
                <label class="task _label complated-label">See the Doctor</label>
                <input type="text" class="task for-input edit-no-display">
                <button class="edit">Edit</button>
                <button class="delete"><img class="img-delete" src="./assets/remove.svg" alt="delete"></button>
            </li>
        </ul>
    </main>
        <script src="./js/app.js"></script>
</body>
</html>
